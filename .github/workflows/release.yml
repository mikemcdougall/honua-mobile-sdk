name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '8.0.x'
  MAUI_VERSION: '8.0.14'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version from tag
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Honua Mobile SDK v${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
        body: |
          ## Honua Mobile SDK v${{ steps.get_version.outputs.version }}

          ### What's New
          - Cross-platform mobile SDK for .NET MAUI
          - Native map controls with platform-specific renderers
          - Field data collection with offline synchronization
          - Camera integration with geotagging
          - Background data sync capabilities

          ### Platform Support
          - ✅ Android API 21+ (Android 5.0+)
          - ✅ iOS 11.0+
          - ✅ Windows 10 v1809+
          - ✅ macOS 10.15+ (via Mac Catalyst)

          ### Installation
          ```
          dotnet add package Honua.Mobile --version ${{ steps.get_version.outputs.version }}
          ```

          ### Documentation
          - [Getting Started](https://github.com/mikemcdougall/honua-mobile-sdk/blob/main/docs/getting-started.md)
          - [Platform Setup](https://github.com/mikemcdougall/honua-mobile-sdk/blob/main/docs/platform-setup.md)
          - [API Documentation](https://docs.honua.dev/mobile-sdk/)

          ### Changes
          See the full changelog below.

  build-and-release:
    name: Build and Release Packages
    runs-on: ubuntu-latest
    needs: create-release

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Pack NuGet Package
      run: |
        dotnet pack src/Honua.Mobile/Honua.Mobile.csproj \
          -c Release \
          --no-restore \
          -p:PackageVersion=${{ needs.create-release.outputs.version }} \
          -p:AssemblyVersion=${{ needs.create-release.outputs.version }} \
          -p:FileVersion=${{ needs.create-release.outputs.version }} \
          -o ./artifacts

    - name: Push to NuGet
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ secrets.NUGET_API_KEY }}

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./artifacts/Honua.Mobile.${{ needs.create-release.outputs.version }}.nupkg
        asset_name: Honua.Mobile.${{ needs.create-release.outputs.version }}.nupkg
        asset_content_type: application/zip

  build-example-apps:
    name: Build Example Applications
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            framework: net8.0-android
            extension: apk
          - os: macos-14
            platform: ios
            framework: net8.0-ios
            extension: app
          - os: windows-2022
            platform: windows
            framework: net8.0-windows10.0.19041.0
            extension: msix
          - os: macos-14
            platform: macos
            framework: net8.0-maccatalyst
            extension: app

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Java (Android)
      if: matrix.platform == 'android'
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '11'

    - name: Select Xcode (iOS/macOS)
      if: matrix.platform == 'ios' || matrix.platform == 'macos'
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Example App (Android)
      if: matrix.platform == 'android'
      run: |
        dotnet publish examples/FieldDataCollection/FieldDataCollection.csproj \
          -f ${{ matrix.framework }} \
          -c Release \
          --no-restore \
          -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
          -p:JavaSdkDirectory=$JAVA_HOME \
          -p:ApplicationVersion=${{ github.run_number }} \
          -p:ApplicationDisplayVersion=${{ needs.create-release.outputs.version }}

    - name: Build Example App (iOS)
      if: matrix.platform == 'ios'
      run: |
        dotnet build examples/FieldDataCollection/FieldDataCollection.csproj \
          -f ${{ matrix.framework }} \
          -c Release \
          --no-restore \
          -p:BuildIpa=false \
          -p:ApplicationVersion=${{ github.run_number }} \
          -p:ApplicationDisplayVersion=${{ needs.create-release.outputs.version }}

    - name: Build Example App (Windows)
      if: matrix.platform == 'windows'
      run: |
        dotnet publish examples/FieldDataCollection/FieldDataCollection.csproj `
          -f ${{ matrix.framework }} `
          -c Release `
          --no-restore `
          -p:ApplicationVersion=${{ github.run_number }} `
          -p:ApplicationDisplayVersion=${{ needs.create-release.outputs.version }}

    - name: Build Example App (macOS)
      if: matrix.platform == 'macos'
      run: |
        dotnet build examples/FieldDataCollection/FieldDataCollection.csproj \
          -f ${{ matrix.framework }} \
          -c Release \
          --no-restore \
          -p:ApplicationVersion=${{ github.run_number }} \
          -p:ApplicationDisplayVersion=${{ needs.create-release.outputs.version }}

    - name: Upload Platform Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: field-data-collection-${{ matrix.platform }}
        path: |
          examples/FieldDataCollection/bin/Release/${{ matrix.framework }}/**/*.${{ matrix.extension }}
          examples/FieldDataCollection/bin/Release/${{ matrix.framework }}/publish/**

  update-documentation:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: [create-release, build-and-release]

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Version Badge in README
      run: |
        sed -i 's/https:\/\/img\.shields\.io\/nuget\/v\/Honua\.Mobile\.svg/https:\/\/img.shields.io\/nuget\/v\/Honua.Mobile.svg?version=${{ needs.create-release.outputs.version }}/g' README.md

    - name: Create Documentation Update PR
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'docs: update version badges for v${{ needs.create-release.outputs.version }}'
        title: 'Update documentation for v${{ needs.create-release.outputs.version }}'
        body: |
          Automated documentation update for release v${{ needs.create-release.outputs.version }}

          - Updated version badges
          - Updated package references
          - Synchronized with latest release

        branch: docs/update-v${{ needs.create-release.outputs.version }}
        base: main

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, build-and-release, build-example-apps]
    if: always() && needs.create-release.result == 'success'

    steps:
    - name: Notify Success
      if: needs.build-and-release.result == 'success'
      run: |
        echo "✅ Honua Mobile SDK v${{ needs.create-release.outputs.version }} has been successfully released!"
        echo "📦 NuGet Package: https://www.nuget.org/packages/Honua.Mobile/${{ needs.create-release.outputs.version }}"
        echo "📋 Release Notes: https://github.com/mikemcdougall/honua-mobile-sdk/releases/tag/v${{ needs.create-release.outputs.version }}"

    - name: Notify Failure
      if: needs.build-and-release.result == 'failure'
      run: |
        echo "❌ Honua Mobile SDK v${{ needs.create-release.outputs.version }} release failed!"
        echo "Please check the workflow logs and try again."
        exit 1