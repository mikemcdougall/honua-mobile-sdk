name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  MAUI_VERSION: '8.0.14'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MAUI Workload
      run: |
        dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '11'

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Android
      run: |
        dotnet publish src/Honua.Mobile/Honua.Mobile.csproj \
          -f net8.0-android \
          -c Release \
          --no-restore \
          -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
          -p:JavaSdkDirectory=$JAVA_HOME

    - name: Build Example App (Android)
      run: |
        dotnet publish examples/FieldDataCollection/FieldDataCollection.csproj \
          -f net8.0-android \
          -c Release \
          --no-restore \
          -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
          -p:JavaSdkDirectory=$JAVA_HOME

    - name: Upload Android Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build
        path: |
          **/bin/Release/net8.0-android/publish/*
          **/*.apk

  build-ios:
    name: Build iOS
    runs-on: macos-14
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

    - name: Restore dependencies
      run: dotnet restore

    - name: Build iOS
      run: |
        dotnet publish src/Honua.Mobile/Honua.Mobile.csproj \
          -f net8.0-ios \
          -c Release \
          --no-restore

    - name: Build Example App (iOS Simulator)
      run: |
        dotnet build examples/FieldDataCollection/FieldDataCollection.csproj \
          -f net8.0-ios \
          -c Release \
          --no-restore \
          -p:BuildIpa=false

    - name: Upload iOS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: |
          **/bin/Release/net8.0-ios/**
          **/*.app

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Windows
      run: |
        dotnet publish src/Honua.Mobile/Honua.Mobile.csproj `
          -f net8.0-windows10.0.19041.0 `
          -c Release `
          --no-restore

    - name: Build Example App (Windows)
      run: |
        dotnet publish examples/FieldDataCollection/FieldDataCollection.csproj `
          -f net8.0-windows10.0.19041.0 `
          -c Release `
          --no-restore

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          **/bin/Release/net8.0-windows10.0.19041.0/publish/**
          **/*.msix

  build-macos:
    name: Build macOS
    runs-on: macos-14
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

    - name: Restore dependencies
      run: dotnet restore

    - name: Build macOS
      run: |
        dotnet publish src/Honua.Mobile/Honua.Mobile.csproj \
          -f net8.0-maccatalyst \
          -c Release \
          --no-restore

    - name: Build Example App (macOS)
      run: |
        dotnet build examples/FieldDataCollection/FieldDataCollection.csproj \
          -f net8.0-maccatalyst \
          -c Release \
          --no-restore

    - name: Upload macOS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: |
          **/bin/Release/net8.0-maccatalyst/**
          **/*.app

  package:
    name: Create NuGet Package
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-windows, build-macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required for GitVersion

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v1.1.1
      with:
        versionSpec: '5.x'

    - name: Determine Version
      uses: gittools/actions/gitversion/execute@v1.1.1
      id: gitversion

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore

    - name: Pack NuGet Package
      run: |
        dotnet pack src/Honua.Mobile/Honua.Mobile.csproj \
          -c Release \
          --no-restore \
          -p:PackageVersion=${{ steps.gitversion.outputs.semVer }} \
          -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
          -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
          -o ./artifacts

    - name: Upload Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg

    - name: Push to NuGet (Preview)
      if: contains(steps.gitversion.outputs.semVer, '-')
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --skip-duplicate

    - name: Push to NuGet (Release)
      if: ${{ !contains(steps.gitversion.outputs.semVer, '-') }}
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ secrets.NUGET_API_KEY }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Security Scan
      uses: securecodewarrior/github-action-add-sarif@v1
      with:
        sarif-file: 'security-scan-results.sarif'

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: security-scan-results.sarif